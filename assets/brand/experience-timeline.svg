<svg width="1200" height="380" viewBox="0 0 1200 380" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Experience timeline animation">
  <defs>
    <linearGradient id="timelineGrad" x1="0" y1="0" x2="1200" y2="380" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="0.5" stop-color="#0E7490"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <filter id="timelineGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="380" rx="24" fill="#F8FAFC"/>

  <!-- Timeline base line -->
  <line x1="120" y1="190" x2="1100" y2="190" stroke="#E2E8F0" stroke-width="2"/>

  <!-- Main timeline path (animated) -->
  <path d="M120 190 L1100 190" stroke="url(#timelineGrad)" stroke-width="3" stroke-dasharray="50 50">
    <animate attributeName="stroke-dashoffset" values="0;100" dur="4s" repeatCount="indefinite"/>
  </path>

  <!-- 2014: Başlangıç -->
  <g filter="url(#timelineGlow)">
    <circle cx="120" cy="190" r="10" fill="#0F172A"/>
    <circle cx="120" cy="190" r="14" fill="none" stroke="#0F172A" stroke-width="2">
      <animate attributeName="r" values="14;22;14" dur="3s" repeatCount="indefinite"/>
    </circle>
    <text x="120" y="230" text-anchor="middle" font-family="Inter, Arial" font-size="14" font-weight="700" fill="#0F172A">2014</text>
    <text x="120" y="250" text-anchor="middle" font-family="Inter, Arial" font-size="11" fill="#475569">Mezuniyet</text>
    <text x="120" y="263" text-anchor="middle" font-family="Inter, Arial" font-size="11" fill="#0E7490">Gıda Mühendisliği</text>
  </g>

  <!-- 2016: Proses Başlangıcı -->
  <g filter="url(#timelineGlow)">
    <circle cx="340" cy="190" r="10" fill="#0E7490"/>
    <circle cx="340" cy="190" r="14" fill="none" stroke="#0E7490" stroke-width="2">
      <animate attributeName="r" values="14;22;14" dur="3.1s" repeatCount="indefinite"/>
    </circle>
    <text x="340" y="230" text-anchor="middle" font-family="Inter, Arial" font-size="14" font-weight="700" fill="#0F172A">2016</text>
    <text x="340" y="250" text-anchor="middle" font-family="Inter, Arial" font-size="11" fill="#475569">Proses Mühendisliği</text>
    <text x="340" y="263" text-anchor="middle" font-family="Inter, Arial" font-size="11" fill="#0E7490">10+ yıl başlangıcı</text>
  </g>

  <!-- 2020: ISO Sertifikasyon -->
  <g filter="url(#timelineGlow)">
    <circle cx="560" cy="190" r="10" fill="#F59E0B"/>
    <circle cx="560" cy="190" r="14" fill="none" stroke="#F59E0B" stroke-width="2">
      <animate attributeName="r" values="14;22;14" dur="3.2s" repeatCount="indefinite"/>
    </circle>
    <text x="560" y="230" text-anchor="middle" font-family="Inter, Arial" font-size="14" font-weight="700" fill="#0F172A">2020</text>
    <text x="560" y="250" text-anchor="middle" font-family="Inter, Arial" font-size="11" fill="#475569">ISO 9001 Sertifikasyon</text>
    <text x="560" y="263" text-anchor="middle" font-family="Inter, Arial" font-size="11" fill="#F59E0B">Baş Denetçi</text>
  </g>

  <!-- 2022: İK Liderliği -->
  <g filter="url(#timelineGlow)">
    <circle cx="780" cy="190" r="10" fill="#0E7490"/>
    <circle cx="780" cy="190" r="14" fill="none" stroke="#0E7490" stroke-width="2">
      <animate attributeName="r" values="14;22;14" dur="3.3s" repeatCount="indefinite"/>
    </circle>
    <text x="780" y="230" text-anchor="middle" font-family="Inter, Arial" font-size="14" font-weight="700" fill="#0F172A">2022</text>
    <text x="780" y="250" text-anchor="middle" font-family="Inter, Arial" font-size="11" fill="#475569">İK Liderliği</text>
    <text x="780" y="263" text-anchor="middle" font-family="Inter, Arial" font-size="11" fill="#0E7490">Ekip Gelişimi</text>
  </g>

  <!-- 2024: Teknoloji Fırını -->
  <g filter="url(#timelineGlow)">
    <circle cx="1000" cy="190" r="10" fill="#F59E0B"/>
    <circle cx="1000" cy="190" r="14" fill="none" stroke="#F59E0B" stroke-width="2">
      <animate attributeName="r" values="14;22;14" dur="3.4s" repeatCount="indefinite"/>
    </circle>
    <text x="1000" y="230" text-anchor="middle" font-family="Inter, Arial" font-size="14" font-weight="700" fill="#0F172A">2024</text>
    <text x="1000" y="250" text-anchor="middle" font-family="Inter, Arial" font-size="11" fill="#475569">Kod + AI Odaklanma</text>
    <text x="1000" y="263" text-anchor="middle" font-family="Inter, Arial" font-size="11" fill="#F59E0B">Dönüşüm Hızlanması</text>
  </g>

  <!-- Legend -->
  <g font-family="Inter, Arial" font-size="11" fill="#0F172A">
    <text x="50" y="360">📈 Her rol, öncekinin üzerine inşa edildi. Deneyim kümülatif ve bağlantılı.</text>
  </g>
</svg>
