<svg width="1200" height="220" viewBox="0 0 1200 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Manual process to automation">
  <defs>
    <linearGradient id="g1" x1="40" y1="0" x2="1160" y2="220" gradientUnits="userSpaceOnUse">
      <stop stop-color="#DC2626"/>
      <stop offset="0.55" stop-color="#0E7490"/>
      <stop offset="1" stop-color="#10B981"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="220" rx="18" fill="#F8FAFC"/>
  <rect x="40" y="50" width="300" height="120" rx="12" fill="#FEE2E2" stroke="#DC2626" stroke-width="2"/>
  <text x="190" y="85" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#7F1D1D">Manuel Surec</text>
  <text x="190" y="110" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" fill="#7F1D1D">Excel + tekrar eden is</text>
  <text x="190" y="130" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" fill="#7F1D1D">16 saat / hafta</text>
  <text x="190" y="150" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" fill="#7F1D1D">%5 hata</text>

  <path d="M360 110H820" stroke="url(#g1)" stroke-width="6" stroke-linecap="round" stroke-dasharray="18 14">
    <animate attributeName="stroke-dashoffset" values="0;32" dur="2.2s" repeatCount="indefinite"/>
  </path>
  <circle cx="590" cy="110" r="14" fill="#0E7490">
    <animate attributeName="r" values="12;17;12" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="590" y="145" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#0E7490">Python Otomasyon</text>

  <rect x="840" y="50" width="320" height="120" rx="12" fill="#ECFDF5" stroke="#10B981" stroke-width="2"/>
  <text x="1000" y="85" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#065F46">Otomatik Sistem</text>
  <text x="1000" y="110" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" fill="#065F46">Script + kontrol akisi</text>
  <text x="1000" y="130" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" fill="#065F46">1 saat / hafta</text>
  <text x="1000" y="150" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" fill="#065F46">%0.1 hata</text>
</svg>
