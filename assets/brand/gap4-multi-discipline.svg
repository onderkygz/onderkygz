<svg width="1200" height="220" viewBox="0 0 1200 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Single discipline to multi-discipline approach">
  <defs>
    <linearGradient id="g4" x1="40" y1="0" x2="1160" y2="220" gradientUnits="userSpaceOnUse">
      <stop stop-color="#DC2626"/>
      <stop offset="0.5" stop-color="#F59E0B"/>
      <stop offset="1" stop-color="#0E7490"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="220" rx="18" fill="#F8FAFC"/>
  <rect x="40" y="50" width="300" height="120" rx="12" fill="#FEE2E2" stroke="#DC2626" stroke-width="2"/>
  <text x="190" y="85" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#7F1D1D">Tek Disiplin</text>
  <text x="190" y="110" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" fill="#7F1D1D">Parcali cozum</text>
  <text x="190" y="130" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" fill="#7F1D1D">Kisa etkili</text>
  <text x="190" y="150" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" fill="#7F1D1D">Surdurulemez</text>

  <path d="M360 110H820" stroke="url(#g4)" stroke-width="6" stroke-linecap="round" stroke-dasharray="18 12">
    <animate attributeName="stroke-dashoffset" values="0;30" dur="2.3s" repeatCount="indefinite"/>
  </path>
  <circle cx="590" cy="110" r="14" fill="#F59E0B">
    <animate attributeName="r" values="12;17;12" dur="2.2s" repeatCount="indefinite"/>
  </circle>
  <text x="590" y="145" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" font-weight="700" fill="#92400E">Insan + Surec + Veri</text>

  <rect x="840" y="50" width="320" height="120" rx="12" fill="#E0F2FE" stroke="#0E7490" stroke-width="2"/>
  <text x="1000" y="85" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#0C4A6E">Cok Disiplin</text>
  <text x="1000" y="110" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" fill="#0C4A6E">Butunsel yaklasim</text>
  <text x="1000" y="130" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" fill="#0C4A6E">Uzun sureli etki</text>
  <text x="1000" y="150" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="12" fill="#0C4A6E">Olculebilir deger</text>
