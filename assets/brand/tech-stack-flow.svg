<svg width="1200" height="480" viewBox="0 0 1200 480" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Technology stack data flow animation">
  <defs>
    <linearGradient id="dataGrad" x1="0" y1="0" x2="1200" y2="480" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="0.5" stop-color="#0E7490"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <filter id="dataGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#0E7490" opacity="0.6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="480" rx="24" fill="#F8FAFC"/>

  <!-- Layer 1: Data Sources -->
  <g font-family="Inter, Arial">
    <text x="100" y="40" font-size="13" font-weight="700" fill="#0F172A">📊 Veri Kaynakları</text>
    
    <!-- Excel/CSV -->
    <rect x="50" y="60" width="100" height="60" rx="8" fill="#217346" opacity="0.9" filter="url(#dataGlow)">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite"/>
    </rect>
    <text x="100" y="95" text-anchor="middle" font-size="12" font-weight="600" fill="white">Excel/CSV</text>
    
    <!-- Database -->
    <rect x="200" y="60" width="100" height="60" rx="8" fill="#CC2927" opacity="0.9" filter="url(#dataGlow)">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="3.2s" repeatCount="indefinite"/>
    </rect>
    <text x="250" y="95" text-anchor="middle" font-size="12" font-weight="600" fill="white">SQL DB</text>
    
    <!-- API/System -->
    <rect x="350" y="60" width="100" height="60" rx="8" fill="#0E7490" opacity="0.9" filter="url(#dataGlow)">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="3.4s" repeatCount="indefinite"/>
    </rect>
    <text x="400" y="95" text-anchor="middle" font-size="12" font-weight="600" fill="white">API/System</text>
  </g>

  <!-- Data flow arrows to Processing -->
  <g stroke="#0E7490" stroke-width="2" opacity="0.5" marker-end="url(#arrowhead)">
    <line x1="100" y1="120" x2="150" y2="200">
      <animate attributeName="stroke-dasharray" values="0;100" dur="2s" repeatCount="indefinite"/>
    </line>
    <line x1="250" y1="120" x2="250" y2="200">
      <animate attributeName="stroke-dasharray" values="0;100" dur="2.2s" repeatCount="indefinite"/>
    </line>
    <line x1="400" y1="120" x2="350" y2="200">
      <animate attributeName="stroke-dasharray" values="0;100" dur="2.4s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- Layer 2: Processing -->
  <g font-family="Inter, Arial">
    <text x="100" y="180" font-size="13" font-weight="700" fill="#0F172A">⚙️ İşleme Katmanı</text>
    
    <!-- Python -->
    <rect x="80" y="200" width="100" height="70" rx="8" fill="#3776AB" opacity="0.9" filter="url(#dataGlow)">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/>
    </rect>
    <text x="130" y="235" text-anchor="middle" font-size="12" font-weight="600" fill="white">Python</text>
    <text x="130" y="255" text-anchor="middle" font-size="10" fill="white" opacity="0.8">ETL/Clean</text>
    
    <!-- Analytics -->
    <rect x="230" y="200" width="100" height="70" rx="8" fill="#0E7490" opacity="0.9" filter="url(#dataGlow)">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="3.2s" repeatCount="indefinite"/>
    </rect>
    <text x="280" y="235" text-anchor="middle" font-size="12" font-weight="600" fill="white">Analytics</text>
    <text x="280" y="255" text-anchor="middle" font-size="10" fill="white" opacity="0.8">Insight</text>
    
    <!-- Automation -->
    <rect x="380" y="200" width="100" height="70" rx="8" fill="#F59E0B" opacity="0.9" filter="url(#dataGlow)">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="3.4s" repeatCount="indefinite"/>
    </rect>
    <text x="430" y="235" text-anchor="middle" font-size="12" font-weight="600" fill="#0F172A">Automation</text>
    <text x="430" y="255" text-anchor="middle" font-size="10" fill="#0F172A" opacity="0.8">RPA/Task</text>
  </g>

  <!-- Arrows to Output -->
  <g stroke="url(#dataGrad)" stroke-width="2" opacity="0.6" marker-end="url(#arrowhead)">
    <path d="M130 270 L130 330" stroke-dasharray="10 5">
      <animate attributeName="stroke-dashoffset" values="0;15" dur="2.5s" repeatCount="indefinite"/>
    </path>
    <path d="M280 270 L280 330" stroke-dasharray="10 5">
      <animate attributeName="stroke-dashoffset" values="5;20" dur="2.7s" repeatCount="indefinite"/>
    </path>
    <path d="M430 270 L430 330" stroke-dasharray="10 5">
      <animate attributeName="stroke-dashoffset" values="10;25" dur="2.9s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Layer 3: Output/Visualization -->
  <g font-family="Inter, Arial">
    <text x="100" y="310" font-size="13" font-weight="700" fill="#0F172A">📈 Çıktı Katmanı</text>
    
    <!-- Power BI Dashboard -->
    <rect x="50" y="330" width="160" height="80" rx="8" fill="#F2C811" opacity="0.9" filter="url(#dataGlow)">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite"/>
    </rect>
    <text x="130" y="365" text-anchor="middle" font-size="12" font-weight="600" fill="#0F172A">Power BI</text>
    <text x="130" y="385" text-anchor="middle" font-size="10" fill="#0F172A" opacity="0.8">Dashboard</text>
    <text x="130" y="402" text-anchor="middle" font-size="10" fill="#0F172A" opacity="0.8">Real-time</text>
    
    <!-- HTML/Web Report -->
    <rect x="250" y="330" width="160" height="80" rx="8" fill="#E34F26" opacity="0.9" filter="url(#dataGlow)">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="3.2s" repeatCount="indefinite"/>
    </rect>
    <text x="330" y="365" text-anchor="middle" font-size="12" font-weight="600" fill="white">HTML Report</text>
    <text x="330" y="385" text-anchor="middle" font-size="10" fill="white" opacity="0.8">Interactive</text>
    <text x="330" y="402" text-anchor="middle" font-size="10" fill="white" opacity="0.8">Web</text>
    
    <!-- Automated Action -->
    <rect x="450" y="330" width="160" height="80" rx="8" fill="#0E7490" opacity="0.9" filter="url(#dataGlow)">
      <animate attributeName="opacity" values="0.7;1;0.7" dur="3.4s" repeatCount="indefinite"/>
    </rect>
    <text x="530" y="365" text-anchor="middle" font-size="12" font-weight="600" fill="white">Automated</text>
    <text x="530" y="385" text-anchor="middle" font-size="10" fill="white" opacity="0.8">Email Alert</text>
    <text x="530" y="402" text-anchor="middle" font-size="10" fill="white" opacity="0.8">Notification</text>
  </g>

  <!-- Cycle indicator -->
  <path d="M 700 200 Q 800 150 900 200 Q 800 250 700 200" stroke="url(#dataGrad)" stroke-width="2" fill="none" stroke-dasharray="30 20">
    <animate attributeName="stroke-dashoffset" values="0;50" dur="3s" repeatCount="indefinite"/>
  </path>
  <text x="800" y="210" text-anchor="middle" font-family="Inter, Arial" font-size="11" fill="#0E7490" font-weight="600">Döngü</text>

  <!-- Legend -->
  <g font-family="Inter, Arial" font-size="10" fill="#475569">
    <text x="100" y="450">💡 Veri → İşlem → Çıktı → Karar → Eylem. Her katman diğerini güçlendirir.</text>
  </g>
</svg>
