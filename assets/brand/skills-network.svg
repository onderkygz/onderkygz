<svg width="1200" height="400" viewBox="0 0 1200 400" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Skills network animation">
  <defs>
    <linearGradient id="skillGrad" x1="0" y1="0" x2="1200" y2="400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="0.5" stop-color="#0E7490"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <filter id="skillGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" rx="24" fill="#F8FAFC"/>

  <!-- Central hub -->
  <circle cx="600" cy="200" r="40" fill="#0F172A" filter="url(#shadow)">
    <animate attributeName="r" values="38;45;38" dur="3s" repeatCount="indefinite"/>
  </circle>
  <text x="600" y="210" text-anchor="middle" font-family="Inter, Arial" font-size="16" font-weight="700" fill="#F59E0B">
    Benim
  </text>

  <!-- Outer ring with skills -->
  <g filter="url(#skillGlow)">
    <!-- Python -->
    <line x1="600" y1="200" x2="750" y2="100" stroke="url(#skillGrad)" stroke-width="3" opacity="0.6">
      <animate attributeName="stroke-width" values="2;4;2" dur="2.8s" repeatCount="indefinite"/>
    </line>
    <circle cx="750" cy="100" r="14" fill="#3776AB">
      <animate attributeName="r" values="12;18;12" dur="2.8s" repeatCount="indefinite"/>
    </circle>
    <text x="750" y="85" text-anchor="middle" font-family="Inter, Arial" font-size="13" font-weight="600" fill="#0F172A">Python</text>

    <!-- SQL/Data -->
    <line x1="600" y1="200" x2="800" y2="200" stroke="url(#skillGrad)" stroke-width="3" opacity="0.6">
      <animate attributeName="stroke-width" values="2;4;2" dur="2.9s" repeatCount="indefinite"/>
    </line>
    <circle cx="800" cy="200" r="14" fill="#0E7490">
      <animate attributeName="r" values="12;18;12" dur="2.9s" repeatCount="indefinite"/>
    </circle>
    <text x="800" y="230" text-anchor="middle" font-family="Inter, Arial" font-size="13" font-weight="600" fill="#0F172A">SQL/Data</text>

    <!-- Power BI -->
    <line x1="600" y1="200" x2="750" y2="300" stroke="url(#skillGrad)" stroke-width="3" opacity="0.6">
      <animate attributeName="stroke-width" values="2;4;2" dur="3s" repeatCount="indefinite"/>
    </line>
    <circle cx="750" cy="300" r="14" fill="#F2C811">
      <animate attributeName="r" values="12;18;12" dur="3s" repeatCount="indefinite"/>
    </circle>
    <text x="750" y="330" text-anchor="middle" font-family="Inter, Arial" font-size="13" font-weight="600" fill="#0F172A">Power BI</text>

    <!-- Web/HTML-CSS -->
    <line x1="600" y1="200" x2="450" y2="300" stroke="url(#skillGrad)" stroke-width="3" opacity="0.6">
      <animate attributeName="stroke-width" values="2;4;2" dur="2.7s" repeatCount="indefinite"/>
    </line>
    <circle cx="450" cy="300" r="14" fill="#E34F26">
      <animate attributeName="r" values="12;18;12" dur="2.7s" repeatCount="indefinite"/>
    </circle>
    <text x="450" y="330" text-anchor="middle" font-family="Inter, Arial" font-size="13" font-weight="600" fill="#0F172A">HTML/CSS</text>

    <!-- AI/Prompt -->
    <line x1="600" y1="200" x2="400" y2="200" stroke="url(#skillGrad)" stroke-width="3" opacity="0.6">
      <animate attributeName="stroke-width" values="2;4;2" dur="2.6s" repeatCount="indefinite"/>
    </line>
    <circle cx="400" cy="200" r="14" fill="#0E7490">
      <animate attributeName="r" values="12;18;12" dur="2.6s" repeatCount="indefinite"/>
    </circle>
    <text x="400" y="230" text-anchor="middle" font-family="Inter, Arial" font-size="13" font-weight="600" fill="#0F172A">AI/Prompt</text>

    <!-- Process Design -->
    <line x1="600" y1="200" x2="450" y2="100" stroke="url(#skillGrad)" stroke-width="3" opacity="0.6">
      <animate attributeName="stroke-width" values="2;4;2" dur="3.1s" repeatCount="indefinite"/>
    </line>
    <circle cx="450" cy="100" r="14" fill="#0F172A">
      <animate attributeName="r" values="12;18;12" dur="3.1s" repeatCount="indefinite"/>
    </circle>
    <text x="450" y="85" text-anchor="middle" font-family="Inter, Arial" font-size="13" font-weight="600" fill="#0F172A">BPMN</text>
  </g>

  <!-- Legend -->
  <g font-family="Inter, Arial" font-size="11" fill="#0F172A">
    <text x="50" y="380">💡 Tüm beceriler merkez "Benim" etrafında dönerken hayat buluyor</text>
  </g>
</svg>
